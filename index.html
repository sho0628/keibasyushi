<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="競馬収支">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1f6f3f">
<meta name="format-detection" content="telephone=no">
<title>競馬収支管理</title>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=7">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=7">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=7">
<link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
<header class="app-header">
  <h1>🏇 競馬収支管理</h1>
  <div class="summary" id="summary">
    <div class="summary-primary">
      <div class="summary-primary-item">
        <span class="label">収支</span>
        <span class="value primary-value" id="totalProfit">¥0</span>
      </div>
      <div class="summary-primary-item">
        <span class="label">回収率</span>
        <span class="value primary-value" id="totalRate">-</span>
      </div>
    </div>
    <div class="summary-secondary">
      <div class="summary-sub-item">
        <span class="label">投資</span>
        <span class="value" id="totalInvest">¥0</span>
      </div>
      <div class="summary-sub-item">
        <span class="label">払戻</span>
        <span class="value" id="totalReturn">¥0</span>
      </div>
      <div class="summary-sub-item">
        <span class="label">的中率</span>
        <span class="value" id="totalHitRate">-</span>
      </div>
    </div>
  </div>
</header>

<main>
  <!-- 記録一覧 -->
  <section class="tab-content active" id="tab-list">
    <div class="calendar">
      <div class="cal-header">
        <button class="cal-nav" id="calPrev" aria-label="前の月">‹</button>
        <button class="cal-title" id="calTitle" aria-label="今月へ"></button>
        <button class="cal-nav" id="calNext" aria-label="次の月">›</button>
      </div>
      <div class="cal-weekdays">
        <div class="cal-weekday cal-sun">日</div>
        <div class="cal-weekday">月</div>
        <div class="cal-weekday">火</div>
        <div class="cal-weekday">水</div>
        <div class="cal-weekday">木</div>
        <div class="cal-weekday">金</div>
        <div class="cal-weekday cal-sat">土</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-footer">
        <span class="cal-month-label">月計</span>
        <span class="cal-monthly-total" id="calMonthlyTotal">¥0</span>
      </div>
    </div>
    <div class="day-detail" id="dayDetail"></div>
  </section>

  <!-- 新規追加 -->
  <section class="tab-content" id="tab-add">
    <form id="recordForm" class="record-form">
      <input type="hidden" id="recordId">
      <div class="form-grid">
        <div class="form-field">
          <label for="date">日付 <span class="required">*</span></label>
          <input type="date" id="date" required>
        </div>
        <div class="form-field">
          <label for="venue">競馬場 <span class="required">*</span></label>
          <select id="venue" required>
            <option value="">選択してください</option>
            <option>札幌</option>
            <option>函館</option>
            <option>福島</option>
            <option>新潟</option>
            <option>東京</option>
            <option>中山</option>
            <option>中京</option>
            <option>京都</option>
            <option>阪神</option>
            <option>小倉</option>
            <option>地方競馬</option>
            <option>海外</option>
          </select>
        </div>
        <div class="form-field">
          <label for="raceNo">レース番号</label>
          <input type="number" id="raceNo" min="1" max="12" placeholder="1〜12" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="form-field full-width">
          <label for="raceName">レース名</label>
          <input type="text" id="raceName" placeholder="例: 日本ダービー" autocomplete="off">
        </div>
      </div>

      <div class="bets-section">
        <div class="bets-section-header">
          <h3>購入した馬券</h3>
          <span class="bets-count" id="betsCount"></span>
        </div>
        <div id="betRows"></div>
        <button type="button" id="addBetBtn" class="btn-secondary btn-add-bet">＋ 馬券を追加</button>
      </div>

      <div class="form-grid">
        <div class="form-field full-width">
          <label for="memo">メモ</label>
          <textarea id="memo" rows="3" placeholder="予想根拠、反省点など"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" id="submitBtn">登録する</button>
        <button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none">キャンセル</button>
      </div>
    </form>
  </section>

  <!-- 集計 -->
  <section class="tab-content" id="tab-stats">
    <h2>集計</h2>
    <div class="stats-section">
      <h3>月別集計</h3>
      <div class="stats-table-wrapper">
        <table class="stats-table" id="monthlyStats"></table>
      </div>
    </div>
    <div class="stats-section">
      <h3>日別集計 (直近30日)</h3>
      <div class="stats-table-wrapper">
        <table class="stats-table" id="dailyStats"></table>
      </div>
    </div>
    <div class="stats-section">
      <h3>馬券種別ごとの集計</h3>
      <div class="stats-table-wrapper">
        <table class="stats-table" id="betTypeStats"></table>
      </div>
    </div>
    <div class="stats-section">
      <h3>競馬場ごとの集計</h3>
      <div class="stats-table-wrapper">
        <table class="stats-table" id="venueStats"></table>
      </div>
    </div>
  </section>

  <!-- データ管理 -->
  <section class="tab-content" id="tab-data">
    <h2>データ管理</h2>
    <div class="data-actions">
      <div class="data-card">
        <h3>📤 エクスポート</h3>
        <p>全データをファイルとしてダウンロードします。バックアップにご利用ください。</p>
        <button id="exportBtn" class="btn-primary">JSONでエクスポート</button>
        <button id="exportCsvBtn" class="btn-secondary">CSVでエクスポート</button>
      </div>
      <div class="data-card">
        <h3>📥 インポート</h3>
        <p>JSONファイルからデータを復元します。既存データは上書きされます。</p>
        <input type="file" id="importFile" accept="application/json,.json">
        <button id="importBtn" class="btn-primary">インポート実行</button>
      </div>
      <div class="data-card danger">
        <h3>⚠️ 全データ削除</h3>
        <p>記録を全て削除します。この操作は取り消せません。</p>
        <button id="resetBtn" class="btn-danger">全データを削除</button>
      </div>
    </div>
  </section>
</main>

<nav class="tab-bar" role="tablist">
  <button class="tab-btn active" data-tab="list" role="tab">
    <span class="tab-icon">📋</span>
    <span class="tab-label">一覧</span>
  </button>
  <button class="tab-btn" data-tab="add" role="tab">
    <span class="tab-icon">➕</span>
    <span class="tab-label">追加</span>
  </button>
  <button class="tab-btn" data-tab="stats" role="tab">
    <span class="tab-icon">📊</span>
    <span class="tab-label">集計</span>
  </button>
  <button class="tab-btn" data-tab="data" role="tab">
    <span class="tab-icon">⚙️</span>
    <span class="tab-label">データ</span>
  </button>
</nav>

<div id="toast" class="toast"></div>

<script src="app.js?v=7"></script>
</body>
</html>
